spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ""

vault:
  enabled: false

opa:
  enabled: false

agent-platform:
  memory:
    enabled: false
    mem0:
      enabled: false
      url: http://localhost:8000
  llm-router:
    enabled: false
