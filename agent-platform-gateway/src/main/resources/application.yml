server:
  port: 8080

spring:
  application:
    name: agent-platform-gateway

  datasource:
    url: jdbc:mysql://localhost:3306/agent_platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8mb4
    username: ${DB_USERNAME:agent_platform}
    password: ${DB_PASSWORD:agent_platform}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:https://auth.example.com}
          jwk-set-uri: ${OAUTH2_JWK_SET_URI:https://auth.example.com/.well-known/jwks.json}

  cache:
    type: caffeine

# MCP Gateway Configuration
mcp:
  gateway:
    canonical-uri: ${MCP_CANONICAL_URI:https://mcp-gateway.example.com}
    health-check-interval: 30000
    # 认证模式开关: local = 网关自签发token, sso = 对接外部SSO授权服务器
    auth-mode: ${MCP_AUTH_MODE:sso}
    # CORS 允许的来源（逗号分隔），留空则拒绝所有跨域请求
    cors:
      allowed-origins: ${MCP_CORS_ALLOWED_ORIGINS:}
    # JWK 密钥配置（仅 local 模式生效）
    jwk:
      # 显式指定 keystore 文件路径（生产环境推荐挂载 Volume 或从 Vault 加载）
      keystore-path: ${MCP_JWK_KEYSTORE_PATH:}
      keystore-password: ${MCP_JWK_KEYSTORE_PASSWORD:changeit}
      key-alias: ${MCP_JWK_KEY_ALIAS:mcp-gateway-key}
      # 未配置 keystore-path 时，首次启动自动生成并持久化到此路径
      auto-generate-path: ${MCP_JWK_AUTO_GENERATE_PATH:data/mcp-gateway-keystore.p12}

# Vault Configuration
vault:
  enabled: ${VAULT_ENABLED:false}
  url: ${VAULT_URL:http://localhost:8200}
  token: ${VAULT_TOKEN:}

# OPA Configuration
opa:
  enabled: ${OPA_ENABLED:false}
  url: ${OPA_URL:http://localhost:8181}

# Subsystem Toggles
agent-platform:
  prompt:
    enabled: false
  vector:
    enabled: false
    milvus:
      host: ${MILVUS_HOST:localhost}
      port: ${MILVUS_PORT:19530}
      collection: agent_platform_vectors
      database: ${MILVUS_DATABASE:default}
    embedding:
      # 企业内部 Embedding 模型配置
      # provider: enterprise | openai | ollama | azure
      # 设为 enterprise 时，使用企业内部模型作为默认模型
      default-provider: ${EMBEDDING_DEFAULT_PROVIDER:enterprise}
      enterprise:
        enabled: ${ENTERPRISE_EMBEDDING_ENABLED:false}
        endpoint: ${ENTERPRISE_EMBEDDING_ENDPOINT:https://dashscope.aliyuncs.com/api/v1/services/embeddings/multimodal-embedding/multimodal-embedding}
        api-key: ${ENTERPRISE_EMBEDDING_API_KEY:}
        model: ${ENTERPRISE_EMBEDDING_MODEL:qwen3-vl-embedding}
        dimension: ${ENTERPRISE_EMBEDDING_DIMENSION:1024}
        timeout-seconds: ${ENTERPRISE_EMBEDDING_TIMEOUT:30}
        # format: dashscope | openai
        format: ${ENTERPRISE_EMBEDDING_FORMAT:dashscope}
  memory:
    enabled: false
    mem0:
      enabled: false
      url: ${MEM0_URL:http://localhost:8000}
  llm-router:
    enabled: false
  rag:
    # RAG 配置
    reranker:
      enabled: ${RAG_RERANKER_ENABLED:true}
      provider: ${RAG_RERANKER_PROVIDER:enterprise}  # local, cohere, bge-api, enterprise
      api-url: ${RAG_RERANKER_API_URL:https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank}
      api-key: ${RAG_RERANKER_API_KEY:}
      model: ${RAG_RERANKER_MODEL:qwen3-vl-rerank}
      instruct: ${RAG_RERANKER_INSTRUCT:}
      # format: dashscope | openai
      format: ${RAG_RERANKER_FORMAT:dashscope}
      retry:
        max-attempts: ${RAG_RERANKER_RETRY_MAX_ATTEMPTS:3}
        delay-ms: ${RAG_RERANKER_RETRY_DELAY_MS:500}
    context-completion:
      enabled: ${RAG_CONTEXT_COMPLETION_ENABLED:true}
      window-size: ${RAG_CONTEXT_COMPLETION_WINDOW_SIZE:1}
    graph:
      enabled: ${RAG_GRAPH_ENABLED:false}
      provider: ${RAG_GRAPH_PROVIDER:memory}  # memory, neo4j
      neo4j-url: ${RAG_GRAPH_NEO4J_URL:}
      neo4j-user: ${RAG_GRAPH_NEO4J_USER:}
      neo4j-password: ${RAG_GRAPH_NEO4J_PASSWORD:}

# Actuator & Observability
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

# Logging
logging:
  level:
    com.agentplatform: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-}] %-5level %logger{36} - %msg%n"

# Feishu Integration
feishu:
  app-id: ${FEISHU_APP_ID:}
  app-secret: ${FEISHU_APP_SECRET:}
  base-url: ${FEISHU_BASE_URL:https://open.feishu.cn/open-apis}
  token:
    refresh-before-expire-seconds: 300
    cache-seconds: 7200
  sync:
    enabled: ${FEISHU_SYNC_ENABLED:true}
    cron-expression: ${FEISHU_SYNC_CRON:0 0 2 * * ?}
    batch-size: ${FEISHU_SYNC_BATCH_SIZE:10}
    max-concurrent: ${FEISHU_SYNC_MAX_CONCURRENT:5}
    scan-interval-hours: ${FEISHU_SYNC_SCAN_INTERVAL:24}
    task-poll-interval-ms: ${FEISHU_SYNC_POLL_INTERVAL:30000}
    space-scan-cron: ${FEISHU_SPACE_SCAN_CRON:0 0 3 * * ?}
  retry:
    max-attempts: ${FEISHU_RETRY_MAX_ATTEMPTS:3}
    initial-interval-ms: ${FEISHU_RETRY_INITIAL_INTERVAL:1000}
    multiplier: ${FEISHU_RETRY_MULTIPLIER:2.0}
    max-interval-ms: ${FEISHU_RETRY_MAX_INTERVAL:60000}

# SpringDoc
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
